[advisories]
ignore = [
    # rsa timing sidechannel via russh - no fix available upstream
    "RUSTSEC-2023-0071",
    # notify crate unmaintained - used only by DNA daemon binary, not the library
    "RUSTSEC-2024-0384",
    # rustls-pemfile unmaintained - transitive dep via axum-server, no upgrade path yet
    "RUSTSEC-2025-0134",
    # paste unmaintained - transitive via tokenizers + tract-core behind optional
    # local-classifier feature only. Macro crate with zero runtime surface.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "BUSL-1.1",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/InnerWarden/innerwarden-mesh",
]
