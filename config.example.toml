[agent]
# Unique id for this host
host_id = "demo-host"

[output]
# Directory where JSONL + state live
data_dir = "./data"
# Keep raw events? (if false, only incidents)
write_events = true

[collectors.auth_log]
enabled = true
path = "/var/log/auth.log"

[collectors.journald]
enabled = true
# Optional: only these systemd units
units = ["sshd", "sudo", "kernel"]

[collectors.exec_audit]
enabled = false
path = "/var/log/audit/audit.log"
# Requires explicit legal authorization; only parse type=TTY when enabled.
include_tty = false

[collectors.docker]
enabled = true
socket = "/var/run/docker.sock"

[collectors.integrity]
enabled = true
paths = [
  "/etc/ssh/sshd_config",
  "/etc/sudoers",
  "/etc/sudoers.d",
  "/etc/cron.d",
]

[collectors.syslog_firewall]
# Reads kernel firewall drop lines (UFW BLOCK / iptables DROP / nftables)
# from rsyslog. On hosts where journald also captures kernel messages
# the agent attributes both collectors to the same `syslog_firewall`
# telemetry stream — see `agent/src/telemetry.rs::telemetry_stream_for`.
enabled = true
path = "/var/log/syslog"

[collectors.systemd_inventory]
# Periodic snapshot of installed/enabled systemd units. Detects newly
# created services, masked legitimate units, and freshly enabled
# persistence vectors. Emits `system.unit_*` events.
enabled = true

[collectors.suid_inventory]
# Periodic snapshot of suid/sgid binaries on common privilege paths.
# Detects newly created suid binaries (a classic privilege-escalation
# persistence technique). Emits `file.suid_*` events.
enabled = true

[detectors.ssh_bruteforce]
enabled = true
# attempts per window triggers incident
threshold = 8
window_seconds = 300

[detectors.suspicious_login]
# Fire a Medium-severity incident when a user logs in outside their normal hours.
# Requires 7 days of login history per user before activating (opt-in, default off).
anomaly_hours_enabled = false

[detectors.credential_stuffing]
enabled = false
# distinct usernames targeted by one source IP within window
threshold = 6
window_seconds = 300

[detectors.port_scan]
enabled = false
# distinct destination ports hit by one source IP within window
threshold = 12
window_seconds = 60

[detectors.sudo_abuse]
enabled = false
# suspicious sudo commands by same user in window
threshold = 3
window_seconds = 300

[shield]
# Inline DDoS shield: rate limiting, SYN tracking, auto-escalation state
# machine (Normal -> Elevated -> UnderAttack -> Critical), XDP wire-speed
# blocking. Always on by default.
enabled = true
bpf_path = "/sys/fs/bpf/innerwarden"
# Dry-run skips real bpftool calls (useful in dev / CI).
dry_run = false

[shield.cloudflare_failover]
# Auto-toggle the Cloudflare DNS proxy ("orange cloud") when shield
# escalation reaches UnderAttack / Critical. The site briefly falls
# behind Cloudflare's anti-DDoS edge, then flips back to direct when
# the attack subsides.
#
# Default `dry_run = true` records what the toggle WOULD do without
# touching the Cloudflare API. Flip to false only after auditing the
# state-transition log for at least a week (an over-eager toggle
# briefly shows Cloudflare's challenge page to legitimate visitors).
enabled = false
dry_run = true
api_token = ""               # Cloudflare API token with Zone.DNS:Edit
zone_id = ""                 # 32-char hex from the dashboard URL
record_id = ""               # DNS record id (GET /zones/{zone}/dns_records?name=...)
activate_on = ["UnderAttack", "Critical"]
min_proxy_duration_secs = 300

[shield.origin_lockdown]
# Insert iptables rules that drop direct-to-origin TCP/80 and TCP/443
# during UnderAttack / Critical, forcing all HTTP(S) through Cloudflare's
# edge. Closes the bypass vector where an attacker who knows the real
# origin IP can punch around Cloudflare.
#
# Default `dry_run = true` because a misconfigured Cloudflare CIDR set
# can lock the operator out of their own server.
enabled = false
dry_run = true
