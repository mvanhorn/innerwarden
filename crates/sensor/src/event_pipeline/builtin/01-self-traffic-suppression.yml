version: 1
metadata:
  author: innerwarden built-in
  description: >
    Drop file access events generated by InnerWarden's own daemons.
    The sensor and agent constantly read config, state, and DB files
    as part of normal operation. Persisting these events creates a
    feedback loop that inflates DB size with zero security value.

rules:
  - id: drop-innerwarden-self-reads
    priority: 90
    match:
      source: ebpf
      kind_in:
        - file.read_access
        - file.write_access
      comm_glob:
        - "innerwarden-*"
    action: drop
    drop_reason: agent-self-traffic
