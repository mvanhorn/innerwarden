version: 1
metadata:
  author: innerwarden built-in
  description: >
    Drop file read/write events from package managers during their
    normal operation. Mirrors the comm list from
    detectors/allowlists.rs::PACKAGE_MANAGERS. Operators who want
    apt/dpkg/snap activity visible can disable this rule.

rules:
  - id: drop-package-manager-file-ops
    priority: 70
    match:
      source: ebpf
      kind_in:
        - file.read_access
        - file.write_access
      comm_in:
        - dpkg
        - dpkg-preconfigu
        - dpkg-reconfigur
        - dpkg-divert
        - apt
        - apt-get
        - apt-cache
        - apt-key
        - apt-listchanges
        - apt-auto-remova
        - apt-add-reposit
        - apt.systemd.dai
        - aptitude
        - unattended-upgr
        - needrestart
        - rpm
        - yum
        - dnf
        - dnf-automatic
        - snap
        - snapd
        - pip
        - pip3
        - npm
        - gem
        - conda
        - uv
        - cargo
        - rustup
        - go
    action: drop
    drop_reason: package-manager-activity
