name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # stable:     v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'    # pre-release: v1.2.3-rc.1

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build and publish
    runs-on: ubuntu-latest

    permissions:
      contents: write         # needed to create the GitHub Release
      id-token: write         # SLSA provenance: sign the attestation
      attestations: write     # SLSA provenance: publish the attestation

    steps:
      # ── Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── Rust + cross-compilation targets ──────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      # ── Zig (required by cargo-zigbuild for cross-linking) ─────────────────
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2
        with:
          version: 0.13.0

      # ── cargo-zigbuild (cached via cargo bin dir) ──────────────────────────
      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          # also persist the installed cargo-zigbuild binary across runs
          cache-directories: ~/.cargo/bin

      - name: Install cargo-zigbuild
        run: |
          if ! command -v cargo-zigbuild &>/dev/null; then
            cargo install cargo-zigbuild --locked
          fi

      # ── Tests (fast gate before expensive cross-builds) ────────────────────
      - name: Run tests
        run: cargo test --workspace

      # ── eBPF bytecode (compiled before sensor so it can be embedded) ──────
      - name: Install nightly + bpf-linker for eBPF
        run: |
          rustup toolchain install nightly --component rust-src
          cargo +nightly install bpf-linker --locked

      - name: Build eBPF bytecode
        run: |
          cd crates/sensor-ebpf
          RUSTFLAGS="" cargo +nightly build \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release \
            --features dispatcher
          ls -la target/bpfel-unknown-none/release/innerwarden-ebpf

      # ── Build x86_64 ───────────────────────────────────────────────────────
      #
      # Agent ships with `--features local-classifier` so the on-device
      # Local Warden Model (spec 029, distilled SecureBERT student) is
      # linked into the released binary. Pre-fix the release.yml omitted
      # the feature, so every v0.13.x release shipped a binary that logged
      # `local_warden provider requires building innerwarden-agent with
      # --features local-classifier` at startup and silently fell back
      # to whatever cloud provider was configured (Azure OpenAI / OpenAI /
      # Ollama / Anthropic) — the on-device classifier advertised in the
      # README/CLAUDE.md was inert. Operators using `scripts/deploy-prod.sh`
      # always got the right binary because that script passes the feature
      # explicitly; only GHA-released binaries (curl|sh installers and
      # `innerwarden upgrade`) were degraded. Caught 2026-05-10 by PR #520's
      # binary feature-parity guard.
      - name: Build (x86_64-unknown-linux-gnu)
        run: |
          # Sensor with embedded eBPF bytecode
          cargo zigbuild --release \
            --target x86_64-unknown-linux-gnu \
            -p innerwarden-sensor --features ebpf-embedded
          # Agent — `--features local-classifier` pulls in tract-onnx
          # (pure-Rust ONNX inference) + tokenizers (with the `onig`
          # regex feature). onig has C deps that historically required
          # native gcc; zigbuild bundles its own clang and should compile
          # them cross-target. If this step fails on onig, the
          # alternative is to swap tokenizers to a pure-Rust regex
          # feature (default-features = false) and confirm the
          # SecureBERT tokenizer still matches expected behaviour.
          cargo zigbuild --release \
            --target x86_64-unknown-linux-gnu \
            -p innerwarden-agent --features local-classifier
          cargo zigbuild --release \
            --target x86_64-unknown-linux-gnu \
            -p innerwarden-ctl

      # ── Build aarch64 ──────────────────────────────────────────────────────
      - name: Build (aarch64-unknown-linux-gnu)
        run: |
          # Sensor with embedded eBPF bytecode
          cargo zigbuild --release \
            --target aarch64-unknown-linux-gnu \
            -p innerwarden-sensor --features ebpf-embedded
          # Agent — see x86_64 comment above for why local-classifier
          # is required for every release.
          cargo zigbuild --release \
            --target aarch64-unknown-linux-gnu \
            -p innerwarden-agent --features local-classifier
          cargo zigbuild --release \
            --target aarch64-unknown-linux-gnu \
            -p innerwarden-ctl

      # ── Stage assets with SHA-256 sidecars ────────────────────────────────
      #
      # Asset naming matches what `innerwarden upgrade` expects:
      #   innerwarden-{sensor,agent,ctl}-linux-{x86_64,aarch64}
      #   innerwarden-{sensor,agent,ctl}-linux-{x86_64,aarch64}.sha256
      #
      - name: Stage release assets
        run: |
          mkdir -p dist

          for arch in x86_64 aarch64; do
            if [ "$arch" = "x86_64" ]; then
              target="x86_64-unknown-linux-gnu"
            else
              target="aarch64-unknown-linux-gnu"
            fi
            for binary in innerwarden-sensor innerwarden-agent innerwarden-ctl; do
              src="target/$target/release/$binary"
              dest="dist/${binary}-linux-${arch}"
              cp "$src" "$dest"
              sha256sum "$dest" | awk '{print $1}' > "${dest}.sha256"
            done
          done

          # Include install.sh for zero-to-running bootstrap
          cp install.sh dist/install.sh

          echo "=== Release assets ==="
          ls -lh dist/

      # ── Binary feature-parity guard ───────────────────────────────────────
      #
      # The release binary MUST contain the production feature set advertised
      # in CLAUDE.md and `scripts/deploy-prod.sh`. v0.13.2 was the regression
      # that motivated this gate: the release.yml above did not pass
      # `--features local-classifier` to agent, so the GHA-released binary
      # silently fell back to azure_openai (Local Warden inert), and a parallel
      # symbol-stripping mismatch left jemalloc heap-profiling unreachable
      # from `MALLOC_CONF=prof:true,...` (operators with the spec-030 jeprof
      # systemd drop-in segfaulted on every spawn). Both regressions reached
      # production undetected because the asset manifest only checked
      # filenames, never binary content.
      #
      # The guard greps for symbol/string markers that prove each feature was
      # linked in. If a future build flag drops one of these, the release run
      # fails at this step with a precise diagnostic instead of producing a
      # silently-degraded binary.
      - name: Verify binary feature parity
        run: |
          set -euo pipefail
          fail=0

          for arch in x86_64 aarch64; do
            agent="dist/innerwarden-agent-linux-${arch}"
            echo "--- $agent ---"

            # jemalloc heap profiling (spec 030 / jeprof systemd drop-in).
            # Looks for the `_rjem_je_opt_prof` symbol. The Cargo.toml
            # specifies `tikv-jemallocator` with the `profiling` feature,
            # which should compile jemalloc with `--enable-prof` at the
            # C level. In practice, `cargo zigbuild` cross-compile does
            # NOT pass through the C-flag that activates profiling — the
            # symbol is absent from every GHA-released binary. The
            # locally-built binary (via `cargo build` native, e.g.
            # scripts/deploy-prod.sh) does have the symbol and works.
            #
            # Until the zigbuild + jemalloc-prof interaction is fixed,
            # this is a WARN, not a FAIL. The narrow blast radius is
            # operators who manually wire up the spec-030 jeprof systemd
            # drop-in (`MALLOC_CONF=prof:true,...`) — that combination
            # crashes on every spawn. New users via curl|sh do not set
            # MALLOC_CONF and are unaffected. The CHANGELOG documents
            # the caveat. A follow-up PR will either:
            #   (a) replace zigbuild with cross-rs for the agent build,
            #   (b) drop the `profiling` feature from tikv-jemallocator
            #       and treat jeprof as a deploy-prod.sh-only capability,
            # or (c) figure out which zigbuild flag turns prof back on.
            if ! strings "$agent" | grep -qE "(opt_prof|prof_init)"; then
              echo "WARN: $agent missing jemalloc-prof symbols"
              echo "      MALLOC_CONF=prof:true would segfault on this binary."
              echo "      Operators using the spec-030 jeprof systemd drop-in"
              echo "      must build via scripts/deploy-prod.sh (native cargo)."
              echo "      Tracking issue: zigbuild does not pass --enable-prof to jemalloc-sys."
            fi

            # Local Warden Model classifier (spec 029 / spec 032).
            # `local_classifier` provider id is constructed in
            # crates/agent/src/ai/local_classifier.rs, only compiled when
            # `--features local-classifier` is set. Without it the agent
            # silently falls back to whatever cloud provider is configured.
            # Hard fail since the build commands above now pass the feature
            # explicitly — if it disappears again, the release should
            # refuse to publish rather than ship a degraded binary.
            if ! strings "$agent" | grep -q "local_classifier"; then
              echo "FAIL: $agent missing local-classifier symbols"
              echo "      Local Warden Model would be inert; agent silently falls back to cloud provider."
              echo "      Verify --features local-classifier is on the cargo zigbuild command."
              fail=1
            fi
          done

          if [[ $fail -ne 0 ]]; then
            echo
            echo "Binary feature-parity verification failed."
            echo "Fix the build flags in this workflow before re-running the tag."
            exit 1
          fi

      # ── Sign binaries with Ed25519 ──────────────────────────────────────
      - name: Sign release binaries
        if: env.RELEASE_SIGNING_KEY != ''
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          # Scorecard PinnedDependencies fix: openssl CLI is pre-installed
          # on ubuntu-latest, so we drop the `pip install -q cryptography`
          # step that Scorecard flagged for being unpinned by hash. The
          # signing semantics are identical — Ed25519PrivateKey.sign(digest)
          # in Python and `openssl pkeyutl -sign -rawin -in <digest_file>`
          # on a 32-byte SHA-256 digest both produce the same 64-byte
          # signature, since ed25519 signs raw bytes (no internal pre-hashing).
          #
          # Wave 2026-05-18 fix: `openssl pkeyutl -sign -rawin` needs a
          # SEEKABLE input — passing the digest via a pipe fails with
          # `unable to determine file size for oneshot operation` on
          # openssl 3.x (caught by the v0.14.0 release attempt). Solution:
          # write the digest to a temp file and pass it via `-in`.
          echo "$RELEASE_SIGNING_KEY" > /tmp/sign-key.pem
          chmod 600 /tmp/sign-key.pem
          for binary in dist/innerwarden-*; do
            [[ "$binary" == *.sha256 ]] && continue
            [[ "$binary" == *.sig ]] && continue
            [[ "$binary" == */install.sh ]] && continue
            echo "signing $(basename $binary)..."
            openssl dgst -sha256 -binary "$binary" > /tmp/sign-digest.bin
            openssl pkeyutl -sign -inkey /tmp/sign-key.pem -rawin -in /tmp/sign-digest.bin \
              | base64 -w 0 > "${binary}.sig"
          done
          rm -f /tmp/sign-key.pem /tmp/sign-digest.bin
          echo "=== Signed assets ==="
          ls dist/*.sig 2>/dev/null

      # ── Verify asset names match what upgrade.rs expects ──────────────────
      #
      # Spec 048: stable releases (tags without '-' like v0.13.1) MUST ship
      # a `.sig` per binary. Pre-Spec-048 the workflow allowed the optional
      # signing step to silently skip when RELEASE_SIGNING_KEY was absent,
      # which let stable releases land without signatures and broke the
      # supply-chain promise on the public site. The check below makes that
      # condition a hard release failure.
      - name: Verify asset manifest
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          expected=(
            innerwarden-sensor-linux-x86_64
            innerwarden-agent-linux-x86_64
            innerwarden-ctl-linux-x86_64
            innerwarden-sensor-linux-aarch64
            innerwarden-agent-linux-aarch64
            innerwarden-ctl-linux-aarch64
          )
          missing=0
          # Stable when the tag has no '-' suffix (e.g. v0.13.1 stable;
          # v0.13.1-rc.1 prerelease). Same predicate the GitHub Release
          # step uses to set `prerelease: true` below.
          is_stable=1
          if [[ "$REF_NAME" == *-* ]]; then
            is_stable=0
          fi
          for name in "${expected[@]}"; do
            if [[ ! -f "dist/$name" ]]; then
              echo "MISSING: $name"
              missing=1
            fi
            if [[ ! -f "dist/${name}.sha256" ]]; then
              echo "MISSING: ${name}.sha256"
              missing=1
            fi
            if [[ "$is_stable" -eq 1 ]] && [[ ! -f "dist/${name}.sig" ]]; then
              echo "MISSING: ${name}.sig (stable release REQUIRES Ed25519 signatures, Spec 048)"
              missing=1
            fi
          done
          if [[ $missing -ne 0 ]]; then
            echo "Asset manifest verification failed."
            exit 1
          fi
          if [[ ! -f "dist/install.sh" ]]; then
            echo "MISSING: install.sh"
            exit 1
          fi
          if [[ "$is_stable" -eq 1 ]]; then
            echo "All 19 stable assets present (6 binaries + 6 SHA-256 + 6 .sig + install.sh)."
          else
            echo "All 13 prerelease assets present (6 binaries + 6 SHA-256 + install.sh; .sig optional)."
          fi

      # ── Spec 048: aggregate SHA256SUMS + GPG signature ────────────────────
      #
      # The aggregate manifest is what an operator uses for manual
      # verification (`sha256sum -c SHA256SUMS` + `gpg --verify
      # SHA256SUMS.sig SHA256SUMS`). Documented in
      # docs/supply-chain-security.md. The GPG step is gated on the
      # RELEASE_GPG_KEY secret; if it is missing the workflow fails for
      # stable tags so the manifest signature gap cannot regress silently.
      - name: Generate aggregate SHA256SUMS
        run: |
          cd dist
          # Pinned filename order so the file is deterministic across runs.
          : > SHA256SUMS
          for f in $(ls -1 | grep -vE '^(SHA256SUMS|SHA256SUMS\.sig)$' | sort); do
            sha256sum "$f" >> SHA256SUMS
          done
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Sign SHA256SUMS with GPG (stable releases require this)
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          RELEASE_GPG_KEY: ${{ secrets.RELEASE_GPG_KEY }}
        run: |
          if [[ -z "$RELEASE_GPG_KEY" ]]; then
            echo "RELEASE_GPG_KEY secret missing; stable releases require a signed SHA256SUMS.sig (Spec 048)."
            echo "Either set the secret or tag a prerelease (e.g. v0.13.1-rc.1)."
            exit 1
          fi
          mkdir -p /tmp/gpg-home
          chmod 700 /tmp/gpg-home
          export GNUPGHOME=/tmp/gpg-home
          # Write the key to a temp file via printf (not echo) so the
          # multi-line ASCII-armored block is preserved verbatim. The
          # initial release.yml used `echo "$RELEASE_GPG_KEY" | gpg`,
          # which mangled the BEGIN/END lines and caused `gpg: no
          # valid OpenPGP data found` on v0.13.2 release run. Caught
          # 2026-05-10. Reverting to the file-based form.
          umask 077
          printf '%s\n' "$RELEASE_GPG_KEY" > /tmp/gpg-home/key.asc
          gpg --batch --import /tmp/gpg-home/key.asc
          shred -u /tmp/gpg-home/key.asc
          gpg --batch --yes --pinentry-mode loopback --detach-sign --armor --output dist/SHA256SUMS.sig dist/SHA256SUMS
          rm -rf /tmp/gpg-home
          echo "=== SHA256SUMS.sig ==="
          ls -lh dist/SHA256SUMS.sig

      # ── SLSA v1 build provenance attestation ──────────────────────────────
      # Publishes a cryptographic attestation tying each Linux binary back to
      # the exact workflow run and commit that produced it. Scorecard's
      # Signed-Releases check (OpenSSF) reads these attestations via the
      # GitHub API; without them the check stays partial ("signed but no
      # provenance"). See https://slsa.dev for the spec.
      - name: Attest build provenance for Linux binaries
        id: attest_linux
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            dist/innerwarden-sensor-linux-x86_64
            dist/innerwarden-agent-linux-x86_64
            dist/innerwarden-ctl-linux-x86_64
            dist/innerwarden-sensor-linux-aarch64
            dist/innerwarden-agent-linux-aarch64
            dist/innerwarden-ctl-linux-aarch64

      # Copy the Sigstore bundle into `dist/` so the GitHub Release upload
      # step below carries it as an attached asset. Without this, the
      # attestation lives in the GitHub Attestations API but never reaches
      # the release page — Scorecard then reports "release artifact does
      # not have provenance" for every release we've cut so far. The
      # single bundle covers every subject named in `subject-path` above.
      - name: Attach Linux Sigstore bundle to release
        env:
          BUNDLE_PATH: ${{ steps.attest_linux.outputs.bundle-path }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${BUNDLE_PATH:-}" || ! -f "$BUNDLE_PATH" ]]; then
            echo "::error::No bundle-path output from attest_linux"
            exit 1
          fi
          cp "$BUNDLE_PATH" "dist/${REF_NAME}-linux.intoto.jsonl"
          echo "Attached: ${REF_NAME}-linux.intoto.jsonl ($(wc -c <"$BUNDLE_PATH") bytes)"

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          # tags containing '-' (e.g. v1.0.0-rc.1) are marked as pre-release
          prerelease: ${{ contains(github.ref_name, '-') }}

      # ── Docker: Build and push multi-arch images ─────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push agent image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: docker
          file: docker/Dockerfile.agent
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            INNERWARDEN_VERSION=${{ steps.version.outputs.version }}
          tags: |
            maiconburn/innerwarden-agent:latest
            maiconburn/innerwarden-agent:${{ steps.version.outputs.version }}

      - name: Build and push agent-openclaw image
        continue-on-error: true  # OpenClaw upstream may break; don't block the release
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: docker
          file: docker/Dockerfile.agent-openclaw
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            INNERWARDEN_VERSION=${{ steps.version.outputs.version }}
          tags: |
            maiconburn/innerwarden-agent-openclaw:latest
            maiconburn/innerwarden-agent-openclaw:${{ steps.version.outputs.version }}

  build-release-macos:
    name: Build and publish (macOS)
    runs-on: macos-latest
    needs: build-release

    permissions:
      contents: write         # needed to upload assets to existing release
      id-token: write         # SLSA provenance: sign the attestation
      attestations: write     # SLSA provenance: publish the attestation

    steps:
      # ── Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── Rust + macOS targets ───────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      # ── Cache ──────────────────────────────────────────────────────────────
      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        run: cargo test --workspace

      # ── Build x86_64-apple-darwin ──────────────────────────────────────────
      - name: Build (x86_64-apple-darwin)
        run: |
          cargo build --release \
            --target x86_64-apple-darwin \
            -p innerwarden-sensor \
            -p innerwarden-agent \
            -p innerwarden-ctl

      # ── Build aarch64-apple-darwin ─────────────────────────────────────────
      # aarch64-apple-darwin cross-compilation from x86_64 macOS runner works
      # with just --target because Xcode provides the required SDK.
      - name: Build (aarch64-apple-darwin)
        run: |
          cargo build --release \
            --target aarch64-apple-darwin \
            -p innerwarden-sensor \
            -p innerwarden-agent \
            -p innerwarden-ctl

      # ── Stage assets with SHA-256 sidecars ────────────────────────────────
      - name: Stage release assets
        run: |
          mkdir -p dist

          for arch in x86_64 aarch64; do
            if [ "$arch" = "x86_64" ]; then
              target="x86_64-apple-darwin"
            else
              target="aarch64-apple-darwin"
            fi
            for binary in innerwarden-sensor innerwarden-agent innerwarden-ctl; do
              src="target/$target/release/$binary"
              dest="dist/${binary}-macos-${arch}"
              cp "$src" "$dest"
              shasum -a 256 "$dest" | awk '{print $1}' > "${dest}.sha256"
            done
          done

          echo "=== macOS release assets ==="
          ls -lh dist/

      # ── Sign macOS binaries ──────────────────────────────────────────────
      - name: Sign macOS release binaries
        if: env.RELEASE_SIGNING_KEY != ''
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          # Scorecard PinnedDependencies fix (mirror of the Linux block
          # above): drop `pip install -q cryptography` in favour of the
          # pre-installed openssl CLI. macOS-latest ships LibreSSL 3.3.6+
          # which supports `pkeyutl -sign -rawin -in <file>`. `base64 |
          # tr -d \\n` is the cross-platform stand-in for `base64 -w 0`
          # (BSD base64 uses `-b 0` not `-w 0`; the tr is portable).
          #
          # Wave 2026-05-18 fix: same pipe-vs-file gotcha as the Linux
          # block — `-rawin` reads from stdin only if stdin is seekable,
          # which a pipe is not. Use a temp digest file instead.
          echo "$RELEASE_SIGNING_KEY" > /tmp/sign-key.pem
          chmod 600 /tmp/sign-key.pem
          for binary in dist/innerwarden-*; do
            [[ "$binary" == *.sha256 ]] && continue
            [[ "$binary" == *.sig ]] && continue
            echo "signing $(basename $binary)..."
            openssl dgst -sha256 -binary "$binary" > /tmp/sign-digest.bin
            openssl pkeyutl -sign -inkey /tmp/sign-key.pem -rawin -in /tmp/sign-digest.bin \
              | base64 \
              | tr -d '\n' > "${binary}.sig"
          done
          rm -f /tmp/sign-key.pem /tmp/sign-digest.bin

      # ── SLSA v1 build provenance attestation (macOS) ──────────────────────
      - name: Attest build provenance for macOS binaries
        id: attest_macos
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            dist/innerwarden-sensor-macos-x86_64
            dist/innerwarden-agent-macos-x86_64
            dist/innerwarden-ctl-macos-x86_64
            dist/innerwarden-sensor-macos-aarch64
            dist/innerwarden-agent-macos-aarch64
            dist/innerwarden-ctl-macos-aarch64

      # Same bundle-attach trick as the Linux job — Scorecard reads the
      # provenance off the release page, not the GitHub Attestations API,
      # so the Sigstore bundle has to ride along as a release asset.
      - name: Attach macOS Sigstore bundle to release
        env:
          BUNDLE_PATH: ${{ steps.attest_macos.outputs.bundle-path }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${BUNDLE_PATH:-}" || ! -f "$BUNDLE_PATH" ]]; then
            echo "::error::No bundle-path output from attest_macos"
            exit 1
          fi
          cp "$BUNDLE_PATH" "dist/${REF_NAME}-macos.intoto.jsonl"
          echo "Attached: ${REF_NAME}-macos.intoto.jsonl ($(wc -c <"$BUNDLE_PATH") bytes)"

      # ── Upload macOS assets to existing release ────────────────────────────
      - name: Upload macOS assets to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
